name: Hyrex CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: hyrex_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run migrations
      env:
        SECRET_KEY: test-secret-key
        DEBUG: True
        DB_NAME: hyrex_db
        DB_USER: postgres
        DB_PASSWORD: admin123
        DB_HOST: localhost
        DB_PORT: 5432
      run: python manage.py migrate

    - name: Run tests
      env:
        SECRET_KEY: test-secret-key
        DEBUG: True
        DB_NAME: hyrex_db
        DB_USER: postgres
        DB_PASSWORD: admin123
        DB_HOST: localhost
        DB_PORT: 5432
      run: python manage.py test